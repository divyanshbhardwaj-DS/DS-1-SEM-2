<!DOCTYPE html>
<html>
<head>
    <title>Online Feedback Form</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #4e73df;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2e59d9;
        }

        .required {
            color: red;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Feedback Form</h2>

    <form>

        <div class="form-group">
            <label>Full Name <span class="required">*</span></label>
            <input type="text" required>
        </div>

        <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" required>
        </div>

        <div class="form-group">
            <label>Rating <span class="required">*</span></label>
            <select required>
                <option value="">-- Select Rating --</option>
                <option>⭐⭐⭐⭐⭐ Excellent</option>
                <option>⭐⭐⭐⭐ Very Good</option>
                <option>⭐⭐⭐ Good</option>
                <option>⭐⭐ Fair</option>
                <option>⭐ Poor</option>
            </select>
        </div>

        <div class="form-group">
            <label>Comments <span class="required">*</span></label>
            <textarea rows="5" required></textarea>
        </div>

        <button type="submit">Submit Feedback</button>

    </form>
</div>

</body>
</html>
